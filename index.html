<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Premium Quote Presentation</title>

<style>
:root {
  --bg: #eef3f8;
  --panel: #ffffff;
  --text: #040f16;
  --muted: #040f16c4;
  --line: #d9e2ec;
  --brand: #0c9aa4;
  --brand-2: #0b6fb8;
  --danger: #cf2e2e;
  --shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
}

/* =========================
   PRINT FOUNDATION (CRITICAL)
========================= */
@page {
  size: A4;
  margin: 0;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  font-family: Inter, Arial, sans-serif;
  font-size: 10px;
  color: var(--text);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* =========================
   MAIN CONTAINER
========================= */
.quote-wrap {
  width: 794px;   /* A4 width */
  margin: 0 auto;
}

/* =========================
   PAGE STRUCTURE
========================= */
.page {
  width: 100%;
  background: #fff;
  box-shadow: var(--shadow);
  border: 1px solid var(--line);
  overflow: hidden;
  page-break-after: always;
}

/* =========================
   COVER PAGE
========================= */
.page-cover {
  display: block;
  min-height: 1123px;
}

.cover-left,
.cover-right {
  display: inline-block;
  vertical-align: top;
}

.cover-left {
  width: 54%;
  padding: 40px;
}

.cover-right {
  width: 46%;
  min-height: 1123px;
  background: url(https://www.aspsys.com/wp-content/uploads/2026/04/pexels-wenhao-sun-737729049-28771177-scaled.jpg);
  background-size: cover;
  background-position: center;
}

/* =========================
   TYPOGRAPHY
========================= */
h1, h2, h3, p {
  margin: 0;
}

/* =========================
   HERO GRID (FIXED)
========================= */
.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}

.hero-card {
  border: 1px solid var(--line);
  padding: 14px;
  background: #fff;
}

/* =========================
   TABLE FIX (IMPORTANT)
========================= */
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  font-size: 12px;
  vertical-align: top;
}

/* Prevent column squish */
td, th {
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* =========================
   PANEL
========================= */
.panel {
  width: 100%;
  background: #fff;
}

.panel-section {
  padding: 24px;
}

/* =========================
   GRID FIX (NO FLEX IN PDF)
========================= */
.two-col {
  display: table;
  width: 100%;
}

.two-col > div {
  display: table-cell;
  width: 50%;
  padding: 10px;
}

/* =========================
   UTILITIES
========================= */
.section-title {
  font-size: 18px;
  text-align: center;
  margin-bottom: 20px;
}

.pill {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
}

.pill-danger {
  border-color: var(--danger);
  color: var(--danger);
  background: #fff4f4;
}

/* =========================
   AVOID SHRINK ISSUES
========================= */
* {
  box-sizing: border-box;
}

img {
  max-width: 100%;
}
  @media print {
  .quote-wrap {
    width: 100%;
    max-width: 100%;
  }
}
</style>
</head>

<body>

<div class="quote-wrap">

<!-- ================= COVER ================= -->
<section class="page page-cover">

  <div class="cover-left">

    <h1 style="font-size:24px;">Aspen Systems, Inc.</h1>

    <p style="margin-top:10px;">
      Confidential Quotation
    </p>

    <div class="hero-grid">
      <div class="hero-card">Quote #: QT-1007</div>
      <div class="hero-card">Client: HRL Laboratories</div>
      <div class="hero-card">Date: 04/28/2026</div>
      <div class="hero-card">Account: C060435</div>
    </div>

    <div style="margin-top:20px;">
      <span class="pill pill-danger">Valid Until: 09/18/2026</span>
    </div>

  </div>

  <div class="cover-right"></div>

</section>

<!-- ================= PAGE 2 ================= -->
<section class="page">

  <div class="panel-section">

    <h2 class="section-title">Quote Lines</h2>

    <table>
      <thead>
        <tr>
          <th>Line</th>
          <th>Part</th>
          <th>Description</th>
          <th>Qty</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>NVIDIA B300</td>
          <td>GPU System</td>
          <td>1</td>
        </tr>
      </tbody>
    </table>

  </div>

</section>

</div>

</body>
</html>
